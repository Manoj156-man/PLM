databases:
  # 1. PostgreSQL Database
  - name: plmdb
    databaseName: plmdb
    user: postgres
    plan: free

services:
  # 2. FastAPI Backend
  - type: web
    name: plm-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: plmdb
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

  # 3. React Frontend
  - type: web
    name: plm-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: plm-backend
          property: url
